<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Color Fly</title>
</head>
<body>
    
<header class="site-header">
    <div class="logo-container">
        <img src="img/pngtree-artist-at-work-painter-with-colorful-palette-png-image_18642447.webp" class="logo">
        <h1 class="site-title">Colorfly Studio</h1>
    </div>
</header>

<main class="main-content">
    <section class="format-section">
        <h2>Formato del Color</h2>
        <div class="format-buttons">
            <button class="button-active">HEX</button>
            <button class="button-active">HSL</button>
        </div>
    </section>
        <section class="palette">
            <div class="color-box"></div>
            <div class="color-box"></div>
            <div class="color-box"></div>
            <div class="color-box"></div>
            <div class="color-box"></div>
            <div class="color-box"></div>
        </section> 
    <section class="format-section">
        <h2>Cantidad de Colores</h2>
        <label>
            <input type="radio" name="quantity" value="6" checked>
            6   
            <input type="radio" name="quantity" value="8">
            8
            <input type="radio" name="quantity" value="9">
            9   
        </label>
    </section>

            <div>
                <button type="button">Generar Paleta</button>
            </div>

</main>

</body>
</html>
